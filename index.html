<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outbound Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a12; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  
  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 30px 24px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .header h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .header p { font-size: 13px; color: rgba(255,255,255,0.4); }
  
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 20px 16px; }
  .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 16px; text-align: center; }
  .stat-number { font-size: 32px; font-weight: 800; line-height: 1; margin-bottom: 6px; }
  .stat-label { font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card.total .stat-number { color: #a78bfa; }
  .stat-card.pending .stat-number { color: #fb923c; }
  .stat-card.replied .stat-number { color: #4ade80; }
  .stat-card.followup .stat-number { color: #c084fc; }

  .progress-section { padding: 0 16px 20px; }
  .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .progress-title { font-size: 13px; color: rgba(255,255,255,0.6); font-weight: 500; }
  .progress-pct { font-size: 13px; color: #a78bfa; font-weight: 700; }
  .progress-bar { background: rgba(255,255,255,0.08); border-radius: 100px; height: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #a78bfa); border-radius: 100px; transition: width 0.8s ease; }

  .section-title { padding: 0 16px 12px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center; }
  .refresh-btn { background: rgba(167,139,250,0.15); border: none; color: #a78bfa; padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: 600; }
  .refresh-btn:hover { background: rgba(167,139,250,0.25); }

  .leads-list { padding: 0 16px 100px; display: flex; flex-direction: column; gap: 8px; }
  .lead-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 14px; display: flex; align-items: center; gap: 12px; transition: all 0.2s; }
  .lead-card:hover { background: rgba(255,255,255,0.07); transform: translateY(-1px); }
  .avatar { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; flex-shrink: 0; }
  .avatar.pending { background: rgba(251,146,60,0.2); color: #fb923c; }
  .avatar.replied { background: rgba(74,222,128,0.2); color: #4ade80; }
  .avatar.followup { background: rgba(192,132,252,0.2); color: #c084fc; }
  .lead-info { flex: 1; min-width: 0; }
  .lead-username { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 3px; }
  .lead-meta { font-size: 11px; color: rgba(255,255,255,0.4); }
  .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
  .status-badge.pending { background: rgba(251,146,60,0.15); color: #fb923c; border: 1px solid rgba(251,146,60,0.3); }
  .status-badge.replied { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
  .status-badge.followup { background: rgba(192,132,252,0.15); color: #c084fc; border: 1px solid rgba(192,132,252,0.3); }

  .filter-bar { display: flex; gap: 8px; padding: 0 16px 16px; overflow-x: auto; }
  .filter-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); padding: 7px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; font-weight: 500; transition: all 0.2s; }
  .filter-btn.active { background: rgba(167,139,250,0.2); border-color: rgba(167,139,250,0.5); color: #a78bfa; }

  .loading { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.3); }
  .spinner { width: 36px; height: 36px; border: 3px solid rgba(167,139,250,0.2); border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .date-header { padding: 16px 16px 8px; font-size: 12px; color: rgba(255,255,255,0.3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .empty { text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.3); font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1>📊 Outbound Tracker</h1>
  <p id="todayDate">Cargando...</p>
</div>

<div class="stats-grid">
  <div class="stat-card total"><div class="stat-number" id="totalCount">0</div><div class="stat-label">Hoy</div></div>
  <div class="stat-card pending"><div class="stat-number" id="pendingCount">0</div><div class="stat-label">Pendiente</div></div>
  <div class="stat-card replied"><div class="stat-number" id="repliedCount">0</div><div class="stat-label">Contestó</div></div>
  <div class="stat-card followup"><div class="stat-number" id="followupCount">0</div><div class="stat-label">Follow-up</div></div>
</div>

<div class="progress-section">
  <div class="progress-header">
    <span class="progress-title">Meta diaria: 70 outbounds</span>
    <span class="progress-pct" id="progressPct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div class="section-title">
  <span>Leads</span>
  <button class="refresh-btn" onclick="loadLeads()">↻ Actualizar</button>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all', this)">Todos</button>
  <button class="filter-btn" onclick="setFilter('Pendiente', this)">Pendiente</button>
  <button class="filter-btn" onclick="setFilter('Contestó', this)">Contestó</button>
  <button class="filter-btn" onclick="setFilter('Follow-up', this)">Follow-up</button>
  <button class="filter-btn" onclick="setFilter('today', this)">Hoy</button>
</div>

<div class="leads-list" id="leadsList">
  <div class="loading"><div class="spinner"></div>Cargando leads...</div>
</div>

<script>
const AIRTABLE_TOKEN = 'patHkf1FRT9N5mLx9.789bd4f8be94e6d2566c3fde5f4497de4b789eb602e3e3340d8ca57c929c8f34';
const AIRTABLE_BASE = 'appiyrgAQxpLTDP36';
const AIRTABLE_TABLE = 'tbl9s489yXa9fHA8h';

let allLeads = [];
let currentFilter = 'all';

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const today = todayStr();
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if (dateStr === today) return 'Hoy';
  if (dateStr === yesterday) return 'Ayer';
  return d.toLocaleDateString('es', { weekday: 'short', day: 'numeric', month: 'short' });
}

function getStatusClass(status) {
  if (status === 'Contestó') return 'replied';
  if (status === 'Follow-up') return 'followup';
  return 'pending';
}

function getInitials(username) {
  return (username || '?').replace('@','').substring(0,2).toUpperCase();
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLeads();
}

async function loadLeads() {
  document.getElementById('leadsList').innerHTML = '<div class="loading"><div class="spinner"></div>Cargando leads...</div>';
  
  try {
    let url = `https://api.airtable.com/v0/${AIRTABLE_BASE}/${AIRTABLE_TABLE}?sort[0][field]=Fecha&sort[0][direction]=desc&sort[1][field]=Hora&sort[1][direction]=desc`;
    let records = [];
    let offset = null;
    
    do {
      const fullUrl = offset ? url + '&offset=' + offset : url;
      const res = await fetch(fullUrl, {
        headers: { 'Authorization': 'Bearer ' + AIRTABLE_TOKEN }
      });
      const data = await res.json();
      records = records.concat(data.records || []);
      offset = data.offset;
    } while (offset);
    
    allLeads = records.map(r => ({
      id: r.id,
      username: r.fields.Usuario || '',
      fecha: r.fields.Fecha || '',
      hora: r.fields.Hora || '',
      status: r.fields.Status || 'Pendiente'
    }));
    
    updateStats();
    renderLeads();
  } catch(e) {
    document.getElementById('leadsList').innerHTML = '<div class="empty">Error cargando datos. Intenta de nuevo.</div>';
  }
}

function updateStats() {
  const today = todayStr();
  const todayLeads = allLeads.filter(l => l.fecha === today);
  const total = todayLeads.length;
  const pending = allLeads.filter(l => l.status === 'Pendiente').length;
  const replied = allLeads.filter(l => l.status === 'Contestó').length;
  const followup = allLeads.filter(l => l.status === 'Follow-up').length;
  const pct = Math.min(100, Math.round((total / 70) * 100));

  document.getElementById('totalCount').textContent = total;
  document.getElementById('pendingCount').textContent = pending;
  document.getElementById('repliedCount').textContent = replied;
  document.getElementById('followupCount').textContent = followup;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  const now = new Date();
  const dateStr = now.toLocaleDateString('es', { weekday: 'long', day: 'numeric', month: 'long' });
  document.getElementById('todayDate').textContent = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
}

function renderLeads() {
  const today = todayStr();
  let filtered = allLeads;
  
  if (currentFilter === 'today') filtered = allLeads.filter(l => l.fecha === today);
  else if (currentFilter !== 'all') filtered = allLeads.filter(l => l.status === currentFilter);

  if (filtered.length === 0) {
    document.getElementById('leadsList').innerHTML = '<div class="empty">No hay leads con este filtro</div>';
    return;
  }

  let html = '';
  let lastDate = '';
  
  filtered.forEach(lead => {
    if (lead.fecha !== lastDate) {
      html += `<div class="date-header">${formatDate(lead.fecha)}</div>`;
      lastDate = lead.fecha;
    }
    const sc = getStatusClass(lead.status);
    const label = lead.status === 'Contestó' ? 'Contestó' : lead.status === 'Follow-up' ? 'Follow-up' : 'Sin resp.';
    html += `
      <div class="lead-card">
        <div class="avatar ${sc}">${getInitials(lead.username)}</div>
        <div class="lead-info">
          <div class="lead-username">${lead.username}</div>
          <div class="lead-meta">${lead.fecha} ${lead.hora ? '· ' + lead.hora : ''}</div>
        </div>
        <div class="status-badge ${sc}">${label}</div>
      </div>`;
  });

  document.getElementById('leadsList').innerHTML = html;
}

loadLeads();
setInterval(loadLeads, 30000);
</script>
</body>
</html>
